protected_invariants:
  learning_default: actively_encouraged
  learning_is_permission_expansion: false
  programization_review_trigger: 10
  programization_is_automatic_conversion: false
  programization_expands_permission: false
  protected_core_auto_change: false
  protected_domains_require_thomas_approval: true
stale_text_patterns:
- CORE_CONTEXT_BINDING_V0.2.md
- New Rule IDs 009–012 add
- Use only the eight rules in `MVP_ACTIVE_CORE.yaml`
- Use only the twelve rules in `MVP_ACTIVE_CORE.yaml`
- core_context_binding.v0.2
- task.v0.2_or_later
- 검증된 저위험 내부 Program은 명시된 Role, Task 유형, 입력 범위와 환경 안에서 자동 활성화할 수 있다.
- Core Context Binding v0.2
- approved_via_release_registry
- 검증된 저위험 내부 Program은 명시된 범위에서 활성화할 수 있으나 Programization은 권한을 확대하지 않는다.
- bundle hash, manifest hash, approval ID를 보존한다.
release_reproducibility:
  manifest_template: THOMAS_CORE/CORE_RELEASE_MANIFEST_TEMPLATE.yaml
  release_directory: THOMAS_CORE/releases
  approval_directory: THOMAS_CORE/approvals
  review_pointer: THOMAS_CORE/REVIEW_CORE_RELEASE.yaml
  current_runtime_pointer: THOMAS_CORE/CURRENT_CORE_RELEASE.yaml
  context_binding_contract: docs/runtime-contracts/CORE_CONTEXT_BINDING_V0.3.md
  context_binding_schema: schemas/core_context_binding.v0.3.schema.json
  runtime_policy_projection: THOMAS_CORE/CORE_RUNTIME_POLICY_PROJECTION.yaml
  invariants:
    manifest_self_approval: false
    approved_release_edit_in_place: false
    semantic_change_requires_new_release: true
    root_task_binding_required: true
    loaded_rules_explicit: true
    silent_mid_task_rebind_allowed: false
    core_approval_grants_execution_permission: false
  artifact_snapshot_directory: THOMAS_CORE/releases/<release_id>/artifacts
  validation_toolchain_snapshot_directory: THOMAS_CORE/releases/<release_id>/validation_toolchain
  activation_directory: THOMAS_CORE/activations
  revocation_directory: THOMAS_CORE/revocations
  deactivation_directory: THOMAS_CORE/deactivations
  historical_release_verification_uses_current_worktree: false
exact_rule_meaning:
  rule_id_alone_is_sufficient: false
  required_context:
  - release_id
  - manifest_sha256
  - rule_id
  legacy_note: Historical records that contain only a Rule ID may identify the conceptual rule family, but not the exact text.
    Exact replay requires a Core Release or legacy snapshot.
document_role: build_and_validation_only_not_part_of_semantic_core_release
