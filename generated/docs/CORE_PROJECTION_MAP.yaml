schema_version: core_projection_map.v0.3
map_version: 0.3.1
core_version: 0.2.1
status: active_validation_map
owner: Thomas
purpose: Map each Thomas Core concept from the canonical human-readable philosophy to its machine-readable, runtime, and operating-policy
