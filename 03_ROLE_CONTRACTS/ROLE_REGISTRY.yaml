document_version: 0.4.0
registry_id: thomas_mvp_role_registry
status: active_mvp
owner: Thomas
router_source_of_truth: true
role_definition_is_capability_source_of_truth: true
last_updated_at: '2026-07-13'
runtime_contracts:
  authority_model: ../docs/runtime-contracts/AUTHORITY_AND_PERMISSION_MODEL.md
  role_assignment: ROLE_ASSIGNMENT_CONTRACT.md
  agent_output: ../docs/runtime-contracts/AGENT_OUTPUT_CONTRACT_V0.2.md
  execution_budget: ../docs/runtime-contracts/EXECUTION_BUDGET_SCHEMA.yaml
  program_registry: ../05_REGISTRIES/PROGRAM_REGISTRY.yaml
  tool_registry: ../05_REGISTRIES/TOOL_REGISTRY.yaml
  core_context_binding: ../docs/runtime-contracts/CORE_CONTEXT_BINDING_V0.3.md
governance:
  allowed_role_statuses:
  - draft
  - candidate
  - active
  - disabled
  - deprecated
  - archived
  runtime_assignment:
    normal_assignment_requires_active_status: true
    normal_assignment_requires_routable_true: true
    candidate_normal_assignment_allowed: false
    disabled_assignment_allowed: false
    deprecated_assignment_allowed: false
    role_assignment_contract_required: true
    minimum_task_contract: task.v0.3
    core_context_binding_required: true
  candidate_trial:
    normal_runtime_routing_allowed: false
    explicit_trial_assignment_allowed: true
    requirements:
    - explicit_thomas_approval
    - exact_candidate_role_version
    - candidate_trial_assignment_mode
    - isolated_trial_context
    - no_external_action
    - no_persistent_runtime_change
    - numeric_execution_budget
    - independent_validation
    - audit_required
    trial_does_not_activate_role: true
    trial_does_not_change_routable: true
  activation:
    candidate_auto_promotion_allowed: false
    explicit_thomas_approval_required: true
    minimum_similar_completed_tasks: 3
    measurable_improvement_required: true
    limited_trial_required: true
    contract_review_required: true
    authority_and_budget_review_required: true
    registry_version_update_required: true
  consistency:
    applies_to_dynamic_roles_only: true
    dynamic_role_fields_that_must_match_definition:
    - role_id
    - role_version
    - status
    - routable
    - role_type
    - capabilities
    - permission_ceiling
    definition_sha256_required: true
    capability_set_sha256_required: true
    mismatch_action: block_routing_and_report
    contract_path_must_exist: true
  authority:
    authority_model: docs/runtime-contracts/AUTHORITY_AND_PERMISSION_MODEL.md
    required_permission_level_must_be_within_role_ceiling: true
    assignment_granted_permission_must_be_within_role_ceiling: true
    permission_decision_is_separate_axis: true
    p5_and_p6_require_separate_policy_gate: true
    role_self_permission_change_allowed: false
  change_control:
    change_authority: Thomas
    agent_direct_modification_allowed: false
    agent_change_proposal_allowed: true
    preserve_change_history: true
    status_permission_capability_or_hash_change_requires_audit: true
selection_policy:
  required_checks:
  - task_contract_is_v0.3_and_core_context_binding_present
  - program_first_when_deterministic
  - role_status_is_active
  - role_is_routable
  - role_definition_hash_matches_registry
  - capability_set_matches_definition
  - capability_match
  - contract_path_exists
  - required_permission_level_within_role_ceiling
  - task_permission_decision_allows_assignment
  - task_and_assignment_budget_are_numeric_and_available
  - required_tool_and_program_scope_available
  - validation_requirement_resolved
  selection_order:
  - program_first_when_deterministic
  - minimum_sufficient_capability
  - lowest_sufficient_permission
  - lowest_sufficient_cost
  - minimum_required_role_count
  - best_context_fit
  fallback:
    enabled: true
    fallback_role_id: general.specialist
    capability_match_required: true
    permission_ceiling_must_be_respected: true
    task_budget_must_be_respected: true
    fallback_cannot_replace_independent_validation: true
