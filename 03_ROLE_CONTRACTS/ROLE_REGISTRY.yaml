schema_version: role_registry.v0.1
document_version: 0.2.0
registry_id: thomas_mvp_role_registry
status: active_mvp
owner: Thomas
router_source_of_truth: true
role_definition_is_capability_source_of_truth: true
last_updated_at: "2026-07-10"

governance:
  allowed_role_statuses:
    - draft
    - candidate
    - active
    - disabled
    - deprecated
    - archived

  runtime_assignment:
    require_active_status: true
    require_routable_true: true
    candidate_assignment_allowed: false
    disabled_assignment_allowed: false
    deprecated_assignment_allowed: false
    role_assignment_contract_required: true

  activation:
    candidate_auto_promotion_allowed: false
    explicit_thomas_approval_required: true
    minimum_similar_completed_tasks: 3
    measurable_improvement_required: true
    limited_trial_required: true
    contract_review_required: true
    permission_and_budget_review_required: true
    registry_update_required: true

  consistency:
    applies_to_dynamic_roles_only: true
    dynamic_role_fields_that_must_match_definition:
      - role_id
      - role_version
      - status
      - routable
      - role_type
      - permission_ceiling
    mismatch_action: block_routing_and_report
    contract_path_must_exist: true

  permission:
    actual_runtime_permission_is_intersection: true
    required_intersection_inputs:
      - system_policy_decision
      - task_permission
      - role_permission_ceiling
      - assignment_granted_permission
      - tool_or_program_scope
    p0_to_p4_are_cumulative_only_within_assigned_scope: true
    p5_and_p6_require_separate_policy_gate: true
    role_self_permission_change_allowed: false

  change_control:
    change_authority: Thomas
    agent_direct_modification_allowed: false
    agent_change_proposal_allowed: true
    preserve_change_history: true
    status_or_permission_change_requires_audit: true

selection_policy:
  required_checks:
    - role_status_is_active
    - role_is_routable
    - role_definition_matches_registry
    - capability_match
    - contract_path_exists
    - task_permission_within_role_ceiling
    - task_budget_is_numeric_and_available
    - required_tool_and_program_scope_available
    - validation_requirement_resolved

  selection_order:
    - program_first_when_deterministic
    - minimum_sufficient_capability
    - lowest_sufficient_permission
    - lowest_sufficient_cost
    - minimum_required_role_count
    - best_context_fit

  fallback:
    enabled: true
    fallback_role_id: general.specialist
    capability_match_required: true
    permission_ceiling_must_be_respected: true
    task_budget_must_be_respected: true
    fallback_cannot_replace_independent_validation: true

non_dynamic_roles:
  - role_id: thomas.prime
    role_name: Thomas Prime
    role_type: chief_autonomous_coordinator
    status: active
    routable: false
    contract_path: THOMAS_PRIME_CHARTER.md
    inherits_dynamic_role_contract: false

active_roles:
  - role_id: general.specialist
    role_name: General Specialist Role
    role_version: 0.2.0
    role_type: dynamic_specialist
    status: active
    routable: true
    contract_path: ROLES/ACTIVE/GENERAL_SPECIALIST_ROLE.md
    capabilities:
      - research
      - analysis
      - planning
      - comparison
      - drafting
    permission_ceiling: P3
    cost_class: STANDARD
    cost_class_is_authorization: false
    active_core_scope: role_assignment_rule_ids_only
    validation_default: automatic
    budget_policy: role_assignment_required
    restrictions:
      external_action_allowed: false
      direct_validated_memory_write_allowed: false
      core_modification_allowed: false
      permission_change_allowed: false

  - role_id: validation.independent
    role_name: Independent Validation Role
    role_version: 0.2.0
    role_type: independent_validator
    status: active
    routable: true
    contract_path: ROLES/ACTIVE/VALIDATION_ROLE.md
    capabilities:
      - objective_alignment_check
      - evidence_check
      - logic_check
      - omission_check
      - uncertainty_check
      - risk_check
      - active_core_alignment_check
      - output_contract_check
    permission_ceiling: P2
    cost_class: LOW
    cost_class_is_authorization: false
    active_core_scope: role_assignment_rule_ids_only
    validation_default: independent
    budget_policy: role_assignment_required
    restrictions:
      external_action_allowed: false
      original_task_execution_allowed: false
      final_high_risk_approval_allowed: false
      direct_validated_memory_write_allowed: false
      core_modification_allowed: false
      permission_change_allowed: false

candidate_roles:
  - role_id: research.general
    role_name: Research Role
    role_version: 0.2.0
    role_type: dynamic_specialist
    status: candidate
    routable: false
    contract_path: ROLES/CANDIDATES/RESEARCH_ROLE.md
    capabilities:
      - evidence_collection
      - source_comparison
      - source_quality_assessment
      - research_gap_identification
    permission_ceiling: P3
    cost_class: STANDARD
    cost_class_is_authorization: false
    promotion_requirements:
      - minimum_three_similar_completed_tasks
      - measurable_improvement_over_general_specialist
      - capability_and_output_tests_passed
      - permission_and_budget_tests_passed
      - limited_trial_passed
      - thomas_approval

  - role_id: translation.general
    role_name: Translation Role
    role_version: 0.2.0
    role_type: dynamic_specialist
    status: candidate
    routable: false
    contract_path: ROLES/CANDIDATES/TRANSLATION_ROLE.md
    capabilities:
      - translation
      - terminology_consistency
      - tone_adaptation
      - ambiguity_disclosure
    permission_ceiling: P3
    cost_class: LOW
    cost_class_is_authorization: false
    promotion_requirements:
      - minimum_three_similar_completed_tasks
      - measurable_improvement_over_general_specialist
      - multilingual_quality_tests_passed
      - permission_and_budget_tests_passed
      - limited_trial_passed
      - thomas_approval

  - role_id: content.general
    role_name: Content Role
    role_version: 0.2.0
    role_type: dynamic_specialist
    status: candidate
    routable: false
    contract_path: ROLES/CANDIDATES/CONTENT_ROLE.md
    capabilities:
      - content_planning
      - drafting
      - audience_adaptation
      - brand_alignment
      - content_risk_identification
    permission_ceiling: P3
    cost_class: STANDARD
    cost_class_is_authorization: false
    promotion_requirements:
      - minimum_three_similar_completed_tasks
      - measurable_improvement_over_general_specialist
      - content_quality_tests_passed
      - publishing_boundary_tests_passed
      - limited_trial_passed
      - thomas_approval

  - role_id: business.analysis
    role_name: Business Analysis Role
    role_version: 0.2.0
    role_type: dynamic_specialist
    status: candidate
    routable: false
    contract_path: ROLES/CANDIDATES/BUSINESS_ANALYSIS_ROLE.md
    capabilities:
      - opportunity_analysis
      - option_comparison
      - revenue_potential_assessment
      - downside_risk_assessment
      - small_validation_design
    permission_ceiling: P3
    cost_class: STANDARD
    cost_class_is_authorization: false
    promotion_requirements:
      - minimum_three_similar_completed_tasks
      - measurable_improvement_over_general_specialist
      - business_case_tests_passed
      - uncertainty_and_downside_tests_passed
      - independent_validation_passed
      - thomas_approval

  - role_id: development.general
    role_name: Development Role
    role_version: 0.2.0
    role_type: dynamic_specialist
    status: candidate
    routable: false
    contract_path: ROLES/CANDIDATES/DEVELOPMENT_ROLE.md
    capabilities:
      - technical_analysis
      - implementation_planning
      - code_review
      - code_draft_generation
    permission_ceiling: P3
    cost_class: STANDARD
    cost_class_is_authorization: false
    activation_blockers:
      - program_and_tool_registry
      - isolated_execution_environment
      - code_change_validation
      - explicit_file_and_deployment_permissions
    promotion_requirements:
      - minimum_three_similar_completed_tasks
      - measurable_improvement_over_general_specialist
      - code_quality_tests_passed
      - sandbox_boundary_tests_passed
      - runtime_and_permission_boundary_tests_passed
      - thomas_approval

role_status_definitions:
  draft:
    routable: false
    description: Definition is incomplete or not reviewed.
  candidate:
    routable: false
    description: Review and limited-trial only; not available for normal routing.
  active:
    routable: true
    description: Approved Dynamic Role available for normal routing when all checks pass.
  disabled:
    routable: false
    description: Temporarily blocked while preserving history and references.
  deprecated:
    routable: false
    description: Replaced role; no new assignments.
  archived:
    routable: false
    description: Preserved only for historical Task and Audit compatibility.

cost_classes:
  authorization_rule: metadata_only_never_grants_permission
  LOW:
    description: Expected low relative cost.
  STANDARD:
    description: Normal cost that must fit the numeric Task budget.
  HIGH_APPROVAL_REQUIRED:
    description: High expected cost requiring explicit numeric budget approval.

audit:
  record_registry_version_used: true
  record_role_selection: true
  record_role_rejection_reason: true
  record_definition_consistency_check: true
  record_permission_intersection_check: true
  record_numeric_budget_check: true
  preserve_disabled_deprecated_and_archived_roles: true

change_history:
  - document_version: 0.1.0
    date: "2026-07-10"
    change: Initial MVP registry with two active and five candidate roles.
    approved_by: Thomas
  - document_version: 0.2.0
    date: "2026-07-10"
    change: Added governance, consistency, promotion, selection, permission, cost, and audit rules.
    approved_by: Thomas
