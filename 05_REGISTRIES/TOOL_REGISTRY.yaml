  # INTERNAL_READ ALLOW action whose real network backend is enabled per-machine by a
  # `network_access` safety-flag activation (runtime/mvp_runtime/safety_gate.py), never
  # by this registry. Flipping these fields would not (and must not) enable it.
  runtime_implementation_available: false
