  definition_sha256: 7e42346e66cdf8731b02425fb869307b09b04719a18d9d2f218808ba5c937635
  # Authority split (QA wave 6b clarification): these fields govern the registered
  # tool-request EXECUTION path (P4+ Tool execution), which remains inactive — hence
