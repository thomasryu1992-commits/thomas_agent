name: Thomas Agent Full Repository Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"
  push:
    tags:
      - "v*"
      - "release-*"

permissions:
  contents: read

concurrency:
  group: thomas-full-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Full validation (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-validation.lock

      - name: Install validation dependencies
        run: python -m pip install -r requirements-validation.lock pytest

      - name: Run full repository gate without writing evidence
        run: python scripts/run_repository_release_gate.py --full --check-only

      # The gate validates contracts and the frozen kernel; the enforcement code (safety
      # gate, kill switch, consumption, workspace confinement) lives in the MVP runtime
      # and is covered only by pytest. A release tag going green without ever executing
      # that suite was a QA finding — full validation now means both.
      #
      # The ephemeral Core matters here as much as in the PR pipeline: without it the
      # ~26 requires_local_core test files (binding, planning, the full pipeline — the
      # highest-value integration tests) silently SKIP, so "full validation" was
      # exercising strictly less than every PR run did.
      - name: Activate an ephemeral Core for the test run
        shell: bash
        run: |
          git config user.email "ci-tests@thomas-agent.local"
          git config user.name "Thomas Agent CI"
          python scripts/ci_activate_core_for_tests.py

      - name: Run the MVP runtime test suite
        run: python -m pytest tests/ -q
