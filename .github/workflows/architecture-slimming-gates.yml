name: Architecture Slimming Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  active-gate:
    name: Active Architecture Gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock

      - name: Install validation dependencies
        run: python -m pip install -r requirements-validation.lock

      - name: Run canonical active architecture gate
        run: python scripts/run_architecture_gate.py --scope active --check-only

  deferred-gate:
    name: Deferred and Legacy Architecture Gates
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock

      - name: Install validation dependencies
        run: python -m pip install -r requirements-validation.lock

      - name: Run canonical deferred architecture gate
        run: python scripts/run_architecture_gate.py --scope deferred --check-only

      - name: Run canonical legacy compatibility gate
        run: python scripts/run_architecture_gate.py --scope legacy --check-only
