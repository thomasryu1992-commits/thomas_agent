name: Architecture Scope Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: thomas-architecture-scopes-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    name: Classify CI scopes
    runs-on: ubuntu-latest
    outputs:
      deferred: ${{ steps.scope.outputs.deferred }}
      legacy: ${{ steps.scope.outputs.legacy }}
      full: ${{ steps.scope.outputs.full }}
      changed_count: ${{ steps.scope.outputs.changed_count }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock

      - name: Install validation dependencies
        run: python -m pip install -r requirements-validation.lock

      - name: Classify changed paths
        id: scope
        shell: bash
        run: >-
          python scripts/classify_ci_scope_changes.py
          --event-name "${{ github.event_name }}"
          --base "${{ github.event.pull_request.base.sha }}"
          --pr-head "${{ github.event.pull_request.head.sha }}"
          --before "${{ github.event.before }}"
          --head "${{ github.sha }}"
          --github-output "$GITHUB_OUTPUT"

  active-gate:
    name: Active Architecture Gate
    needs: classify-changes
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6
        if: needs.classify-changes.outputs.full != 'true'
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        if: needs.classify-changes.outputs.full != 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock

      - name: Install validation dependencies
        if: needs.classify-changes.outputs.full != 'true'
        run: python -m pip install -r requirements-validation.lock

      # The full Release Gate's check list is a superset of every scope; when it runs in
      # this pipeline, running the scoped gate too would execute each validator twice.
      # Step-level (not job-level) so the job still completes for required-check policies.
      - name: Run canonical active architecture gate
        if: needs.classify-changes.outputs.full != 'true'
        run: python scripts/run_architecture_gate.py --scope active --check-only

      - name: Covered by the full Release Gate
        if: needs.classify-changes.outputs.full == 'true'
        run: echo "Active checks run once in this pipeline's Full validation job."

  deferred-gate:
    name: Deferred Architecture Gate
    needs: classify-changes
    if: needs.classify-changes.outputs.deferred == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        if: needs.classify-changes.outputs.full != 'true'
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        if: needs.classify-changes.outputs.full != 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock

      - name: Install validation dependencies
        if: needs.classify-changes.outputs.full != 'true'
        run: python -m pip install -r requirements-validation.lock

      - name: Run canonical deferred architecture gate
        if: needs.classify-changes.outputs.full != 'true'
        run: python scripts/run_architecture_gate.py --scope deferred --check-only

      - name: Covered by the full Release Gate
        if: needs.classify-changes.outputs.full == 'true'
        run: echo "Deferred checks run once in this pipeline's Full validation job."

  legacy-gate:
    name: Legacy Compatibility Gate
    needs: classify-changes
    if: needs.classify-changes.outputs.legacy == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        if: needs.classify-changes.outputs.full != 'true'
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        if: needs.classify-changes.outputs.full != 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock

      - name: Install validation dependencies
        if: needs.classify-changes.outputs.full != 'true'
        run: python -m pip install -r requirements-validation.lock

      - name: Run canonical legacy compatibility gate
        if: needs.classify-changes.outputs.full != 'true'
        run: python scripts/run_architecture_gate.py --scope legacy --check-only

      - name: Covered by the full Release Gate
        if: needs.classify-changes.outputs.full == 'true'
        run: echo "Legacy checks run once in this pipeline's Full validation job."

  full-gate:
    name: Full validation
    needs: classify-changes
    if: needs.classify-changes.outputs.full == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock

      - name: Install validation dependencies
        run: python -m pip install -r requirements-validation.lock

      - name: Run full repository gate for shared CI or Gate infrastructure changes
        run: python scripts/run_repository_release_gate.py --full --check-only
