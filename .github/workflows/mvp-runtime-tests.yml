name: MVP Runtime Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mvp-runtime-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: MVP runtime pytest
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    env:
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock

      - name: Install dependencies
        run: python -m pip install -r requirements-validation.lock pytest

      - name: Activate an ephemeral Core for the test run
        shell: bash
        run: |
          git config user.email "ci-tests@thomas-agent.local"
          git config user.name "Thomas Agent CI"
          python scripts/ci_activate_core_for_tests.py

      - name: Run MVP runtime test suite
        run: python -m pytest tests/ -q
