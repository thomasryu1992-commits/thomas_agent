schema_version: read_only_runtime_mutation_cases.v0.1
cases:
- case_id: invalid_runtime_authoritative_mode
  target: bundle
  path: run_mode
  value: RUNTIME_READ_ONLY
  rebuild_integrity: true
  expected_reason: RUNTIME_AUTHORITATIVE_MODE_DISABLED
- case_id: invalid_external_network_allowed
  target: bundle
  path: constraints.external_network_allowed
  value: true
  rebuild_integrity: true
  expected_reason: READ_ONLY_BOUNDARY_INVALID
- case_id: invalid_filesystem_write_allowed
  target: bundle
  path: constraints.filesystem_write_allowed
  value: true
  rebuild_integrity: true
  expected_reason: READ_ONLY_BOUNDARY_INVALID
- case_id: invalid_model_invocation_allowed
  target: bundle
  path: constraints.model_invocation_allowed
  value: true
  rebuild_integrity: true
  expected_reason: READ_ONLY_BOUNDARY_INVALID
- case_id: invalid_secret_key_in_bundle
  target: bundle
  path: integrity.api_key
  value: forbidden
  rebuild_integrity: false
  expected_reason: INPUT_BUNDLE_INVALID
- case_id: invalid_bundle_fingerprint
  target: bundle
  path: integrity.bundle_sha256
  value: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  rebuild_integrity: false
  expected_reason: BUNDLE_FINGERPRINT_MISMATCH
- case_id: invalid_task_requester_unauthenticated
  target: task
  path: source.requester.authenticated
  value: false
  expected_reason: REQUESTER_NOT_AUTHENTICATED
- case_id: invalid_task_not_queued
  target: task
  path: lifecycle.status
  value: RUNNING
  expected_reason: TASK_NOT_QUEUED
- case_id: invalid_task_missing_no_external_action
  target: task
  path: scope.constraints
  value:
  - no_tool_execution
  - no_program_execution
  expected_reason: TASK_EXTERNAL_ACTION_BOUNDARY_MISSING
- case_id: invalid_task_tool_request_present
  target: task
  path: routing.tool_request_ids
  value:
  - toolreq_forbidden_001
  expected_reason: RESOURCE_REQUEST_PRESENT
- case_id: invalid_task_program_request_present
  target: task
  path: routing.program_request_ids
  value:
  - progreq_forbidden_001
  expected_reason: RESOURCE_REQUEST_PRESENT
- case_id: invalid_task_program_route
  target: task
  path: routing.selected_route
  value: PROGRAM
  expected_reason: ROUTE_NOT_SUPPORTED
- case_id: invalid_task_multi_assignment
  target: task
  path: routing.role_assignment_ids
  value:
  - assignment_i0_5_readonly_001
  - assignment_i0_5_readonly_002
  expected_reason: MULTI_ACTOR_ROUTE_NOT_SUPPORTED
- case_id: invalid_binding_task_id
  target: core_context_binding
  path: identity.task_id
  value: task_other
  expected_reason: CORE_BINDING_LINEAGE_MISMATCH
- case_id: invalid_binding_revision
  target: core_context_binding
  path: identity.task_revision
  value: 2
  expected_reason: CORE_BINDING_LINEAGE_MISMATCH
- case_id: invalid_binding_rule_scope
  target: core_context_binding
  path: rules.loaded_rule_ids
  value:
  - MVP_RULE_006
  expected_reason: CORE_RULE_SCOPE_MISMATCH
- case_id: invalid_binding_missing_approval
  target: core_context_binding
  path: release.approval_id
  value: null
  expected_reason: CORE_RELEASE_GOVERNANCE_REFERENCE_MISSING
- case_id: invalid_assignment_task_id
  target: role_assignment
  path: task_id
  value: task_other
  expected_reason: ASSIGNMENT_LINEAGE_MISMATCH
- case_id: invalid_assignment_actor
  target: role_assignment
  path: actor_instance_id
  value: agent_instance_other
  expected_reason: ASSIGNMENT_ROUTE_MISMATCH
- case_id: invalid_assignment_tool_allowlist
  target: role_assignment
  path: allowed_tool_ids
  value:
  - document.reader
  expected_reason: ASSIGNMENT_RESOURCE_SCOPE_NOT_EMPTY
- case_id: invalid_assignment_model_budget
  target: role_assignment
  path: execution_budget.limits.max_model_calls
  value: 1
  expected_reason: ASSIGNMENT_EXTERNAL_BUDGET_NOT_ZERO
- case_id: invalid_role_candidate_status
  target: role_definition
  path: status
  value: candidate
  expected_reason: ROLE_NOT_ACTIVE_ROUTABLE
- case_id: invalid_role_not_routable
  target: role_definition
  path: routable
  value: false
  expected_reason: ROLE_NOT_ACTIVE_ROUTABLE
- case_id: invalid_role_external_action
  target: role_definition
  path: external_action_allowed
  value: true
  expected_reason: ROLE_EXTERNAL_ACTION_ALLOWED
- case_id: invalid_role_capability_missing
  target: role_definition
  path: capabilities
  value:
  - planning
  expected_reason: CAPABILITY_CHAIN_INVALID
- case_id: invalid_authority_effective_low
  target: role_assignment
  path: authority.effective_permission_level
  value: P1
  expected_reason: AUTHORITY_INSUFFICIENT_OR_EXCESSIVE
- case_id: invalid_authority_ceiling_high
  target: role_assignment
  path: authority.role_permission_ceiling
  value: P4
  expected_reason: AUTHORITY_INSUFFICIENT_OR_EXCESSIVE
- case_id: invalid_permission_approval_required
  target: task
  path: permission.permission_decision
  value: APPROVAL_REQUIRED
  expected_reason: PERMISSION_NOT_EXECUTABLE_READ_ONLY
- case_id: invalid_permission_block
  target: task
  path: permission.permission_decision
  value: BLOCK
  expected_reason: PERMISSION_NOT_EXECUTABLE_READ_ONLY
- case_id: invalid_assignment_permission_mismatch
  target: role_assignment
  path: permission.permission_decision_ref
  value: perm_other
  expected_reason: ASSIGNMENT_PERMISSION_MISMATCH
- case_id: invalid_role_registry_missing_entry
  target: role_registry
  path: roles
  value: []
  expected_reason: ROLE_REGISTRY_MISMATCH
- case_id: invalid_role_registry_definition_hash
  target: role_registry
  path: roles.0.definition_sha256
  value: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  expected_reason: ROLE_REGISTRY_MISMATCH
- case_id: invalid_role_registry_definition_field_duplication
  target: role_registry
  path: roles.0.capabilities
  value:
  - research
  expected_reason: ROLE_REGISTRY_MISMATCH
- case_id: invalid_role_registry_definition_path
  target: role_registry
  path: roles.0.definition_path
  value: examples/read_only_runtime/input/other_role_definition.yaml
  expected_reason: ROLE_REGISTRY_MISMATCH
- case_id: invalid_tool_registry_enabled
  target: tool_registry
  path: tools.0.enabled
  value: true
  expected_reason: TOOL_REGISTRY_NOT_READ_ONLY_SAFE
- case_id: invalid_program_registry_enabled
  target: program_registry
  path: programs.0.enabled
  value: true
  expected_reason: PROGRAM_REGISTRY_NOT_READ_ONLY_SAFE
- case_id: invalid_i0_4_freeze_status
  target: i0_4_contract_set_index
  path: contract_set.freeze_status
  value: OPEN_FOR_NEW_CONTRACTS
  expected_reason: I0_4_CONTRACT_SET_NOT_FROZEN
