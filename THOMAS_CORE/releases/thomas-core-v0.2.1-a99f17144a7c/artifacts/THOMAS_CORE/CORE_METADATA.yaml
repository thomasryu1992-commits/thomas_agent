schema_version: thomas_core_metadata.v0.4
core_version: 0.2.1
owner: Thomas
primary_runtime_identity: Thomas Prime
canonical_human_readable_source: THOMAS_CORE_PHILOSOPHY.md
created_purpose: Thomas 기반 자율 전문 조직의 공통 정체성, Mission, Vision, 가치, 사고, 판단, 운영, 위험, 학습, 커뮤니케이션, 기회 철학을 정의한다.
core_governance:
  principles:
  - Thomas Core는 Thomas Prime과 모든 전문 Role이 공유하는 최상위 정체성 및 판단 기준이다.
  - Thomas Core는 단순 사용자 프로필이 아니다.
  - 사람이 읽는 Canonical Philosophy와 기계가 읽는 Runtime Projection을 구분한다.
  - Agent는 경험을 통해 적극적으로 학습할 수 있다.
  - 학습은 권한 확대 또는 보호된 Core 자동 변경을 의미하지 않는다.
  - Identity, Mission, Vision, Core Values, 장기 목표, 위험, Permission, Constitution 변경은 Thomas 승인을 요구한다.
core_files:
  philosophy: THOMAS_CORE_PHILOSOPHY.md
  identity_projection: THOMAS_IDENTITY.md
  values_projection: THOMAS_VALUES.yaml
  goals_projection: THOMAS_GOALS.yaml
  decision_model_projection: THOMAS_DECISION_MODEL.yaml
  preference_projection: THOMAS_PREFERENCE_PROFILE.yaml
  revenue_preference_model: THOMAS_REVENUE_PREFERENCE_MODEL.yaml
  mvp_scope: MVP_CORE_SCOPE.md
  mvp_active_core: MVP_ACTIVE_CORE.yaml
  runtime_policy_projection: CORE_RUNTIME_POLICY_PROJECTION.yaml
  release_manifest_template: CORE_RELEASE_MANIFEST_TEMPLATE.yaml
  review_release_pointer: REVIEW_CORE_RELEASE.yaml
  current_release_pointer: CURRENT_CORE_RELEASE.yaml
canonical_source_status:
  philosophy: thomas_approved
  identity: thomas_approved
  values: thomas_approved
  goals: thomas_approved
  decision_model: thomas_approved
  preference_profile: thomas_approved
information_status:
  approved:
    definition: Thomas가 직접 표현했거나 명확하게 확인한 정보
    runtime_use: 승인된 범위 안에서 판단 기준으로 사용 가능
  provisional:
    definition: 반복 대화, 행동, 결과에서 추론한 정보
    runtime_use: 보조 기준 및 학습 후보로 사용 가능
    restriction: 보호된 Core를 단독으로 변경하는 근거로 사용 금지
  candidate:
    definition: 새로운 관찰 또는 반복 결과에서 발견된 학습·개선·Core 변경 후보
    runtime_use: 범위와 위험 수준에 따라 시험 또는 검토
  validated_operational_knowledge:
    definition: 반복 증거, 측정 가능한 개선, 검증, 범위, 버전, Rollback을 갖춘 저위험 운영 지식
    runtime_use: 승인된 범위의 낮은 위험 운영에서 자동 활용 가능
    restriction: 권한 확대와 보호된 Core 변경에 사용 금지
  deprecated:
    definition: 현재 Thomas 또는 현재 운영 환경을 더 이상 반영하지 않는 정보
    runtime_use: 현재 기본 판단 기준으로 사용 금지
learning_stance:
  default: actively_encouraged
  principle: Agent는 Task 결과, 성공, 실패, 피드백에서 지속적으로 학습하고 발전한다.
  learning_is_permission_expansion: false
  low_risk_operational_learning: allowed_with_evidence_scope_version_monitoring_and_rollback
  validated_operational_knowledge_auto_use: true
  automatic_learning_domains:
  - reporting_format
  - frequently_used_expression
  - information_detail_preference
  - task_order
  - task_decomposition
  - search_method
  - low_risk_workflow
  - tool_selection
  - program_selection
  - retry_method
  - error_prevention
  - quality_check
  - low_risk_prompt
  - low_risk_role_instruction
  protected_domains:
  - identity
  - mission
  - vision
  - core_values
  - long_term_goals
  - risk_policy
  - permission_policy
  - operating_constitution
  - authority_ceiling
  - external_execution_authority
  - financial_authority
  protected_domain_auto_change: false
  protected_domain_change_requires:
  - evidence
  - change_candidate
  - validation
  - explicit_thomas_approval
  - versioned_update
  - audit_record
core_change_policy:
  learning_candidate_creation: allowed
  low_risk_operational_adaptation: allowed_with_evidence_scope_version_monitoring_and_rollback
  validated_operational_knowledge_use: allowed_with_scope_version_monitoring_and_rollback
  protected_core_automatic_activation: prohibited
  explicit_thomas_approval_required_for_protected_core: true
  versioned_update_required: true
  audit_record_required: true
  candidate_creation: allowed
  automatic_activation: prohibited
  explicit_thomas_approval_required: true
mvp_projection:
  definition_status: thomas_approved
  version: 0.2.1
  source: MVP_ACTIVE_CORE.yaml
  only_active_runtime_core: true
  runtime_activation_source: CURRENT_CORE_RELEASE.yaml
  dynamic_status_is_not_stored_in_semantic_core: true
runtime_rule:
- MVP Runtime은 MVP_ACTIVE_CORE.yaml의 명시된 Active Rule만 강제한다.
- 상세 Core 문서는 명시적 Context 또는 Projection 용도로 사용한다.
- 검증된 저위험 운영 학습은 정의된 범위에서 자동 활용할 수 있다.
- 학습은 권한 확대를 의미하지 않는다.
- 보호된 Core는 Thomas 승인 없이 변경할 수 없다.
- 반복 증거는 Core Change Candidate를 만들 수 있지만 보호된 Core를 자동 활성화하지 않는다.
- 10회 이상의 유효한 반복은 Program 자동 전환이 아니라 Programization Review Trigger다.
- 검증된 저위험 내부 Program Candidate는 Program Registry와 Permission Policy를 통과한 뒤에만 제한 범위 활성화 대상이 될 수 있으며, Programization은 권한을 확대하지
  않는다.
- Runtime Task는 승인된 Core Release에 Binding v0.3으로 연결하며 release ID, version, manifest path/hash, approval ID와 activation ID를
  보존한다.
- 승인된 Core Release는 과거 Task 재현을 위한 불변 참조이며, 의미 변경은 새 Core Version과 새 Release를 요구한다.
- 실행 중인 Task는 새 Core Release로 조용히 자동 재바인딩하지 않는다.
- Runtime은 runtime_activation_status가 approved_via_activation_registry인 Current Core만 새 Task Binding에 사용할 수 있다.
- Task는 Core Context Binding v0.3으로 승인된 Release를 참조하며, Release Artifact와 Active Rule 전체를 Binding에 중복 복사하지 않는다.
- Core 승인과 Core Context Binding은 실행 Permission을 부여하지 않는다.
- Rule ID의 정확한 의미는 Rule ID 단독이 아니라 Core Release ID와 Manifest hash를 통해 해당 Release Snapshot에서 해석한다.
programization_stance:
  default: review_repeated_deterministic_work_for_programization
  review_trigger:
    minimum_valid_repetitions: 10
    meaning: trigger_review_not_automatic_conversion
  candidate_requirements:
  - stable_input_contract
  - deterministic_or_rule_stable_processing
  - measurable_output
  - defined_exceptions
  - agent_baseline_available
  - shadow_or_limited_comparison
  - measurable_improvement
  - rollback_available
  conversion_scope: repeated_deterministic_slice_only
  agent_retains:
  - novel_judgment
  - interpretation
  - strategy
  - material_exception_handling
  low_risk_internal_activation: candidate_only_pending_program_registry_and_permission_policy
  high_impact_activation: requires_existing_permission_approval_and_policy_controls
  programization_expands_permission: false
release_governance:
  release_directory: THOMAS_CORE/releases
  approval_directory: THOMAS_CORE/approvals
  review_pointer: THOMAS_CORE/REVIEW_CORE_RELEASE.yaml
  current_runtime_pointer: THOMAS_CORE/CURRENT_CORE_RELEASE.yaml
  manifest_template: THOMAS_CORE/CORE_RELEASE_MANIFEST_TEMPLATE.yaml
  runtime_requires_approved_release: true
  runtime_requires_core_context_binding: true
  release_manifest_self_approval: false
  approved_release_edit_in_place: false
  semantic_change_requires_new_release: true
  running_task_silent_rebind: false
  core_approval_grants_execution_permission: false
  material_rebind_requires:
  - task_revision_increment
  - new_core_context_binding
  - replan
  - reauthorization
  - affected_assignment_invalidation
  - affected_permission_invalidation
  - affected_approval_invalidation
  - audit
  artifact_snapshot_required: true
  validation_toolchain_snapshot_required: true
  activation_directory: THOMAS_CORE/activations
  revocation_directory: THOMAS_CORE/revocations
  deactivation_directory: THOMAS_CORE/deactivations
  runtime_authoritative_approval_required: true
  unverified_manual_approval_runtime_activation_allowed: false
definition_status: thomas_approved
canonical_files:
