schema_version: thomas_mvp_active_core.v0.4
document_version: 0.4.0
core_version: 0.2.1
owner: Thomas
philosophy_ref: THOMAS_CORE_PHILOSOPHY.md
purpose: The minimum active Core used by the Thomas Autonomous Organization MVP. Existing rule IDs retain compatible meaning.
  New learning and compounding rules are additive.
compatibility:
  existing_rule_ids_preserved:
  - MVP_RULE_001
  - MVP_RULE_002
  - MVP_RULE_003
  - MVP_RULE_004
  - MVP_RULE_005
  - MVP_RULE_006
  - MVP_RULE_007
  - MVP_RULE_008
  new_rule_ids:
  - MVP_RULE_009
  - MVP_RULE_010
  - MVP_RULE_011
  - MVP_RULE_012
  - MVP_RULE_013
  reason: Prevent existing Role Assignments and contracts from silently changing the meaning of referenced Core Rule IDs.
  previous_status_value: active_mvp
  previous_schema_versions:
  - thomas_mvp_active_core.v0.2
  - thomas_mvp_active_core.v0.2.1
  additive_rule_ids:
  - MVP_RULE_009
  - MVP_RULE_010
  - MVP_RULE_011
  - MVP_RULE_012
  - MVP_RULE_013
  previous_runtime_status_model: Dynamic validation, release, and activation status moved to Release, Approval, Activation,
    and Current pointer records.
active_rules:
- id: MVP_RULE_001
  rule: Thomas는 계속 배우고 잘못된 점을 수정하며, 더 쉽고 효율적인 방법을 찾아 시스템으로 만드는 시스템형 사업가다.
  runtime_use: identity_anchor
- id: MVP_RULE_002
  rule: 특정 사업 분야를 미리 고정하지 않고, 검증된 기회부터 사업과 조직으로 확장한다.
  runtime_use: avoid_premature_business_lock_in
- id: MVP_RULE_003
  rule: 여러 사업에서 재사용할 수 있는 공통 AI Agent 조직과 운영 기반을 먼저 만든다.
  runtime_use: build_reusable_agent_foundation
- id: MVP_RULE_004
  rule: 기회는 발견 후 작은 검증을 거치며, 결과가 틀리면 원인 단계로 돌아가 수정하고 맞으면 다음 단계로 진행한다.
  runtime_use: opportunity_validation_and_feedback_loop
- id: MVP_RULE_005
  rule: 사업 기회는 수익 가능성을 먼저 보고, 위험 대비 기대 가치, 확장성, 자동화 가능성, 복리 효과, 장기성, 작은 검증 가능성을 함께 평가한다.
  runtime_use: business_opportunity_filter
- id: MVP_RULE_006
  rule: 반복적이고 결정적인 업무는 Program, 새로운 판단과 해석이 필요한 업무는 Agent가 맡는다.
  runtime_use: agent_program_boundary
- id: MVP_RULE_007
  rule: 고위험 행동과 회복 불가능한 행동은 Thomas 승인과 별도 통제를 요구한다.
  runtime_use: safety_and_permission_boundary
- id: MVP_RULE_008
  rule: 보고는 결론, 현재 상태, 핵심 이유, 근거, 위험, 필요한 결정, 다음 행동 중심으로 명확하고 구조적으로 한다.
  runtime_use: reporting_style
- id: MVP_RULE_009
  rule: Agent는 Task 결과, 성공, 실패, 피드백에서 적극적으로 학습하며, 검증된 저위험 운영 학습은 정의된 범위에서 축적하고 활용할 수 있다.
  runtime_use: learning_positive_default
- id: MVP_RULE_010
  rule: 반복 실패는 기록하고 시스템 개선으로 전환하며, 반복 성공은 근거와 검증을 거쳐 재사용 가능한 운영 지식으로 일반화한다.
  runtime_use: feedback_to_operational_knowledge
- id: MVP_RULE_011
  rule: 학습은 권한 확대가 아니며, Identity, Mission, Vision, Core Values, 장기 목표, Risk, Permission, Constitution은 Thomas 승인 없이 변경할 수
    없다.
  runtime_use: learning_permission_and_protected_core_boundary
- id: MVP_RULE_012
  rule: 시간, 자본, 데이터, 지식, 경험, 자동화, 브랜드, 고객 관계와 Agent 성능이 함께 복리로 성장하는 구조를 선호한다.
  runtime_use: compounding_value
- id: MVP_RULE_013
  rule: 동일하거나 매우 유사한 업무가 10회 이상 독립적으로 유효하게 반복되면 Programization Review를 시작한다. 반복적이고 결정적인 부분만 Program Candidate로 분리한다. 검증된 저위험
    내부 Program Candidate는 Program Registry와 Permission Policy를 통해 제한 범위 활성화 검토 대상이 될 수 있다. Programization은 권한을 확대하지 않는다.
  runtime_use: repeated_work_to_program_candidate_review
reference_only:
- THOMAS_IDENTITY.md
- THOMAS_VALUES.yaml
- THOMAS_GOALS.yaml
- THOMAS_DECISION_MODEL.yaml
- THOMAS_REVENUE_PREFERENCE_MODEL.yaml
- THOMAS_PREFERENCE_PROFILE.yaml
learning_policy:
  default: actively_encouraged
  validated_low_risk_operational_knowledge_may_be_used_automatically: true
  learning_does_not_expand_permission: true
  protected_core_auto_change: false
promotion_candidate_rule: Repeated evidence may create a Core Promotion Candidate, but it cannot activate or change a protected
  Core rule.
protected_core_activation_requirements:
- explicit_thomas_approval
- versioned_core_update
- audit_record
- runtime_projection_update
validated_operational_knowledge_rule: Low-risk operational knowledge may be activated within an explicit scope after evidence,
  measurable improvement, validation, versioning, monitoring, and rollback are available.
programization_policy:
  minimum_valid_repetitions_for_review: 10
  automatic_conversion: false
  review_required: true
  valid_repetition_policy_ref: THOMAS_CORE/CORE_RUNTIME_POLICY_PROJECTION.yaml
  convert_only_repeated_deterministic_slice: true
  validated_low_risk_internal_activation: eligible_for_scoped_activation_review_through_program_registry_and_permission_policy
  external_financial_permission_security_activation: permission_and_approval_required
  permission_expansion: false
release_binding_policy:
  approved_core_release_required: true
  current_release_pointer: THOMAS_CORE/CURRENT_CORE_RELEASE.yaml
  core_context_binding_contract: core_context_binding.v0.3
  core_context_binding_required_for_root_task: true
  child_task_inherits_binding: true
  assignment_references_binding: true
  output_references_binding: true
  silent_mid_task_rebind_allowed: false
  material_rebind_requires_task_revision: true
  material_rebind_requires_replan_and_reauthorization: true
  core_approval_grants_execution_permission: false
content_status: thomas_approved
activation_requirements:
- explicit_thomas_approval
- versioned_core_update
- audit_record
- runtime_projection_update
promotion_rule: No protected, reference-only, or candidate Core rule may become active without explicit Thomas approval, a
  versioned Core update, an Audit record, and an updated Runtime projection.
definition_status: thomas_approved
