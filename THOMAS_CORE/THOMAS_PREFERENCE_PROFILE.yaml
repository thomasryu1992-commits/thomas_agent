schema_version: thomas_preference_profile.v0.1
version: 0.1.0
owner:
  name: Thomas

communication:
  primary_language: korean
  secondary_contexts:
    - english_business
    - english_global_content
  preferred_tone:
    general:
      - friendly
      - direct
      - professional
      - clear
      - practical
  avoid:
    - excessively_formal
    - vague
    - repetitive
    - overly_abstract

explanation_style:
  preferred_order:
    - conclusion
    - overall_structure
    - reasoning
    - detailed_steps
    - practical_example
    - recommended_next_action
  preferences:
    - 복잡한 개념은 쉬운 언어로 설명한다.
    - 전체 구조를 먼저 보여준다.
    - 단계별 진행 순서를 제공한다.
    - 실제 사례를 포함한다.
    - 가능한 경우 표, 흐름, 구조를 사용한다.
    - 실행할 수 있는 결과를 제공한다.

detail_level:
  simple_question: concise
  concept_explanation: medium_to_detailed
  system_architecture: very_detailed
  development_plan: very_detailed
  operational_report: summary_first

reporting:
  default_format:
    - conclusion
    - current_status
    - completed
    - important_findings
    - risks_or_gaps
    - recommendation
    - next_step
  normal_operation:
    notification: summarized
    detailed_logs: available_on_request
  successful_low_risk_action:
    policy: execute_and_include_in_summary
  minor_recoverable_problem:
    policy: attempt_recovery_then_report
  repeated_problem:
    policy: report_root_cause_and_prevention
  high_risk_problem:
    policy: immediate_notification_and_action_block
  preferred_information:
    - clear_status
    - progress_percentage_when_meaningful
    - actual_evidence
    - remaining_work
    - recommended_decision
  avoid:
    - every_minor_step_notification
    - repeated_confirmation
    - unnecessary_approval_request
    - raw_logs_without_interpretation

work_style:
  planning:
    preferences:
      - 전체 목표를 먼저 정의한다.
      - 전체 구조를 이해한다.
      - 단계별 로드맵을 만든다.
      - 각 단계의 완료 기준을 설정한다.
      - 검증 후 다음 단계로 이동한다.
  execution:
    preferences:
      - 작은 구현 단위
      - 단계별 검증
      - 실제 사용 가능성 확인
      - 기존 구조와의 호환성 고려
      - 점진적 확대
  automation:
    desired:
      - 반복 업무 최대 자동화
      - 낮은 위험 업무 자율 실행
      - 실패 자동 복구
      - 결과 자동 평가
      - 위험과 중요한 예외만 보고
    avoid:
      - 모든 작업에 승인 요구
      - 동일한 수동 작업 반복
      - Agent가 정해진 계산을 매번 추론
      - 자동화가 사람의 관리 부담을 증가시키는 구조
  delegation:
    preferences:
      - 복잡한 전문 판단은 전문 Agent
      - 반복 계산과 처리는 Program
      - 독립 검토는 Validation Agent
      - 외부 실행은 제한된 Execution Service
      - 위험 통제는 Policy Engine

development:
  preferences:
    - 비개발자 친화적 운영
    - 쉬운 설치
    - 최소 설정
    - 명확한 실행 버튼 또는 명령
    - 오류 발생 시 이해 가능한 설명
    - 자동 검증
    - 복구 가능한 구조

system_complexity:
  prefer:
    - 필요한 최소 Agent
    - 명확한 책임
    - 재사용 가능한 Program
    - 확장 가능한 인터페이스
  avoid:
    - 역할이 중복되는 Agent
    - 목적 없는 Agent 증가
    - 불필요한 기술 복잡성
    - 현재 사용하지 않는 기능의 과도한 구현

decision_preferences:
  new_idea:
    preferred_response:
      - 장기 목표 관련성 확인
      - 기존 우선순위 영향 확인
      - 작은 실험 방법 제안
      - 성공 기준 정의
  recommendation:
    required:
      - recommended_option
      - reason
      - expected_benefit
      - main_risk
      - next_action
  multiple_options:
    preferred:
      - 비교
      - 장단점
      - 추천 순위
      - 최종 추천
  uncertainty:
    preferred:
      - 불확실성을 명확히 표시
      - 확인된 사실과 추론 분리
      - 가능한 검증 방법 제시

content_preferences:
  preferred:
    - structured
    - evidence_based
    - practical
    - easy_to_understand
    - future_oriented
    - insightful
  avoid:
    - unsupported_claim
    - meaningless_hype
    - unnecessary_repetition
    - excessive_jargon
    - conclusion_without_action

dislikes:
  communication:
    - 결론이 없는 긴 설명
    - 같은 내용의 반복
    - 질문 의도와 관계없는 설명
    - 실행 방법 없는 일반론
    - 불확실한 내용을 확정적으로 표현
  workflow:
    - 이미 제공한 정보를 다시 질문
    - 작은 단계마다 승인 요청
    - 자동화 가능한 수동 반복
    - 진행 상태를 알 수 없는 장시간 작업
  architecture:
    - 모든 기능을 Agent로 구현
    - 책임이 겹치는 Agent
    - 하나의 Agent가 생성, 승인, 실행, 평가를 모두 담당
    - 위험 통제를 Agent의 자율 판단에만 의존
    - 검증 없는 완전 자동화

learning_preferences:
  allowed_automatic_learning:
    - reporting_format
    - frequently_used_expression
    - low_risk_workflow
    - tool_selection
    - task_order
    - information_detail_preference
  approval_required:
    - core_identity_change
    - core_value_change
    - long_term_goal_change
    - risk_tolerance_change
    - permission_expansion
  preference_inference:
    minimum_evidence:
      weak_candidate: 3
      medium_candidate: 5
      strong_candidate: 10
    default_status: candidate

notification_preferences:
  notify_immediately:
    - high_risk
    - irreversible_action_required
    - critical_goal_blocked
    - major_security_issue
    - significant_financial_or_reputation_impact
  include_in_summary:
    - completed_low_risk_tasks
    - recovered_minor_errors
    - routine_improvements
    - normal_performance
  do_not_interrupt:
    - routine_success
    - temporary_self_recovered_error
    - low_value_operational_detail
