schema_version: thomas_core_metadata.v0.2
core_version: 0.1.1
package_status: evolving_draft
owner: Thomas
primary_runtime_identity: Thomas Prime
created_purpose: Thomas 기반 자율 전문 조직의 공통 정체성, 가치, 목표, 판단, 운영 선호를 정의한다.
canonical_source_status:
  identity: approved
  values: mixed_approved_and_provisional
  goals: approved
  decision_model: approved_with_future_calibration
  preference_profile: approved_with_future_calibration
mvp_projection:
  status: active
  version: 0.1.1
  source: MVP_ACTIVE_CORE.yaml
  only_active_runtime_core: true
core_governance:
  principles:
  - Thomas Core는 Thomas Prime과 모든 전문 Role이 공유하는 최상위 정체성 및 판단 기준이다.
  - Thomas Core는 단순 사용자 프로필이 아니다.
  - Agent와 Prime은 Core 변경 후보를 제안할 수 있지만 직접 적용할 수 없다.
  - 핵심 가치, 장기 목표, 위험 경계, 권한과 활성 Core 변경은 Thomas 승인 없이 적용할 수 없다.
core_files:
  identity: THOMAS_IDENTITY.md
  values: THOMAS_VALUES.yaml
  goals: THOMAS_GOALS.yaml
  decision_model: THOMAS_DECISION_MODEL.yaml
  preference_profile: THOMAS_PREFERENCE_PROFILE.yaml
  runtime_summary: THOMAS_CORE_RUNTIME_SUMMARY.md
  revenue_preference_model: THOMAS_REVENUE_PREFERENCE_MODEL.yaml
  mvp_scope: MVP_CORE_SCOPE.md
  mvp_active_core: MVP_ACTIVE_CORE.yaml
information_status:
  approved:
    definition: Thomas가 직접 표현했거나 명확하게 확인한 정보
    runtime_use: 승인된 범위 안에서 판단 기준으로 사용 가능
  provisional:
    definition: 반복적인 대화와 행동 패턴에서 추론한 정보
    runtime_use: 보조 기준으로만 사용 가능
    restriction: 핵심 가치나 장기 목표를 확정하는 단독 근거로 사용 금지
  candidate:
    definition: 새로운 행동 패턴 또는 반복 사례에서 발견된 변경 후보
    runtime_use: 자동 적용 금지
  deprecated:
    definition: 더 이상 현재 Thomas를 반영하지 않는 과거 정보
    runtime_use: 현재 판단 기준으로 사용 금지
core_change_policy:
  candidate_creation: allowed
  automatic_activation: prohibited
  explicit_thomas_approval_required: true
  versioned_update_required: true
  audit_record_required: true
runtime_rule:
- MVP Runtime은 MVP_ACTIVE_CORE.yaml만 활성 Core로 사용한다.
- Reference-only Core는 Assignment allowlist 또는 명시적 Context Reference가 없으면 Runtime
  의무 규칙으로 사용하지 않는다.
- 반복 사례는 Core Promotion Candidate를 만들 수 있지만 Active Core를 자동 변경하지 않는다.
